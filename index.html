<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proyectos de Título</title>
        <style>
          *,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

@import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

:root {
    --color-oscurisimo: #000;
    --color-oscuro: #444;
    --color-normal: #999;
    --color-iluminado: #aaa;
    --color-iluminadisimo: #ddd;
    --fuente: "Source Code Pro", monospace;
}

body {
    font-family: var(--fuente);
    color: var(--color-normal);
    text-align: center;
    font-size: 100%;
}

a {
    color: var(--color-oscuro);
    text-decoration: none;
}

a:hover {
    color: var(--color-oscurisimo);
    text-decoration: underline;
}
div#contenedor {
    margin: 1rem auto;
    width: 90%;
    max-width: 980px;
}

h1 {
    margin: 1rem 0;
    font-weight: 400;
    font-size: calc(100% + 3vw + 3vh);
}

h2 {
    margin: 3rem 0;
    font-weight: 400;
    letter-spacing: 0.25rem;
    font-size: calc(100% + 1vw + 1vh);
    color: var(--color-oscuro);
}

input {
    border: 0.1rem solid var(--color-iluminado);
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 15px;
    color: var(--color-oscuro);
    outline: none;
    margin-bottom: 1.5rem;
    width: 100%;
    display: block;
    background-image: url('svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<title>79_Warning_strip_2_v15</title>
<path d="M22.53,50,5.66,33.12H20L36.91,50,20,66.88H5.66Zm29.19,0L34.85,33.12H49.14L66.1,50,49.22,66.88H34.85ZM80,50,63.09,33.12H77.38L94.34,50,77.47,66.88H63.09Z"></path>
</svg>');
    background-repeat: no-repeat;
    background-size: 1rem;
    background-position: 99% center;
}

input::placeholder {
    color: var(--color-iluminado);
}

input:focus {
    border-color: var(--color-normal);
}

div#contenedordetabla {
    overflow-x: auto;
    font-size: 90%;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    margin-bottom: 3rem;
}

thead {
    background: var(--color-iluminadisimo);
    color: var(--color-oscuro);
}

tbody {
    color: var(--color-normal);
}

td,
th {
    border: 1px solid var(--color-normal);
    padding: 0.75rem;
}

th:nth-child(1),
td:nth-child(1),
th:nth-child(4),
td:nth-child(4) {
    text-align: center;
}

td:nth-child(2) {
    color: var(--color-oscuro);
    font-weight: 800;
}

td:nth-child(3) {
    font-style: italic;
}
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>ᕙ( •̀ ᗜ •́ )ᕗ</h1>
            <h2>Proyectos de Título</h2>

            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>Títulado</th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoría</th>
                            <th>Prof.Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/f094d885-24b9-4a38-bbcf-678d070a2795";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.id}</td><td>${x.name}</td><td>${x.track}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
