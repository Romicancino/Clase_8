<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proyectos de Título</title>
        <style>
          *,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

@import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

:root {
    --color-oscurisimo: #62366E;
    --color-oscuro: #444;
    --color-normal: #999;
    --color-iluminado: #CAA5D4;
    --color-iluminadisimo: #DDDBFF;
    --fuente: "Source Code Pro", monospace;
}

body {
    font-family: var(--fuente);
    color: var(--color-normal);
    text-align: center;
    font-size: 100%;
}

a {
    color: var(--color-oscuro);
    text-decoration: none;
}

a:hover {
    color: var(--color-oscurisimo);
    text-decoration: underline;
}
div#contenedor {
    margin: 1rem auto;
    width: 90%;
    max-width: 980px;
}

h1 {
    margin: 1rem 0;
    font-weight: 400;
    font-size: calc(100% + 3vw + 3vh);
}

h2 {
    margin: 3rem 0;
    font-weight: 400;
    letter-spacing: 0.25rem;
    font-size: calc(100% + 1vw + 1vh);
    color: var(--color-oscuro);
}

input {
    border: 0.1rem solid var(--color-iluminado);
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 15px;
    color: var(--color-oscuro);
    outline: none;
    margin-bottom: 1.5rem;
    width: 100%;
    display: block;
    background-image: url('<svg fill="#a600ff" height="200px" width="200px" version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 496 496" xml:space="preserve" stroke="#a600ff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <g> <path d="M472,129.125V83.741l9.92-2.208c8.288-1.848,14.08-9.056,14.08-17.544s-5.792-15.696-14.08-17.544L297.168,5.381 c-32.2-7.16-66.128-7.16-98.328,0L14.08,46.445C5.792,48.293,0,55.501,0,63.989s5.792,15.696,14.08,17.544L112,103.301v120.688 c-22.056,0-40,17.944-40,40c0,13.128,6.448,24.704,16.248,32c-9.8,7.296-16.248,18.872-16.248,32s6.448,24.704,16.248,32 c-9.8,7.296-16.248,18.872-16.248,32s6.448,24.704,16.248,32c-9.8,7.296-16.248,18.872-16.248,32c0,22.056,17.944,40,40,40h304 v-16c-13.232,0-24-10.768-24-24s10.768-24,24-24v-16c-13.232,0-24-10.768-24-24s10.768-24,24-24v-16c-13.232,0-24-10.768-24-24 s10.768-24,24-24v-16c-13.232,0-24-10.768-24-24c0-13.232,10.768-24,24-24v-16h-32V103.301l72-16v41.824 c-13.768,3.576-24,15.992-24,30.864v24v8v16h16v-16h8v16h16v-16h8v16h16v-16v-8v-24C496,145.117,485.768,132.701,472,129.125z M88,327.989c0-13.232,10.768-24,24-24h40v48h-40C98.768,351.989,88,341.221,88,327.989z M384.016,479.989H112 c-13.232,0-24-10.768-24-24s10.768-24,24-24h272.016c-5.032,6.688-8.016,15-8.016,24S378.984,473.301,384.016,479.989z M384.016,415.989H112c-13.232,0-24-10.768-24-24s10.768-24,24-24h40v32h18.424L192,385.605l21.576,14.384H232v-32h152.016 c-5.032,6.688-8.016,15-8.016,24S378.984,409.301,384.016,415.989z M168,382.373v-78.384h48v78.384l-24-16L168,382.373z M384.016,351.989H232v-48h152.016c-5.032,6.688-8.016,15-8.016,24S378.984,345.301,384.016,351.989z M384.016,239.989 c-5.032,6.688-8.016,15-8.016,24c0,9,2.984,17.312,8.016,24H112c-13.232,0-24-10.768-24-24c0-13.232,10.768-24,24-24H384.016z M128,191.989v-85.136l70.832,15.744c16.104,3.576,32.648,5.392,49.168,5.392s33.064-1.816,49.168-5.392L368,106.853v85.136h-16 v16h16v16H128v-16h208v-16H128z M293.696,106.973c-29.936,6.656-61.456,6.656-91.392,0L17.552,65.909 C16.648,65.717,16,64.901,16,63.989c0-0.912,0.648-1.728,1.544-1.92l184.76-41.064c14.968-3.328,30.336-5.016,45.696-5.016 s30.728,1.688,45.696,5.016l184.752,41.064c0.904,0.192,1.552,1.008,1.552,1.92c0,0.912-0.648,1.728-1.544,1.92L293.696,106.973z M480,175.989h-32v-16c0-8.824,7.176-16,16-16c8.824,0,16,7.176,16,16V175.989z"></path> </g> </g> </g></svg>');
    background-repeat: no-repeat;
    background-size: 1rem;
    background-position: 99% center;
}

input::placeholder {
    color: var(--color-iluminado);
}

input:focus {
    border-color: var(--color-normal);
}

div#contenedordetabla {
    overflow-x: auto;
    font-size: 90%;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    margin-bottom: 3rem;
}

thead {
    background: var(--color-iluminadisimo);
    color: var(--color-oscuro);
}

tbody {
    color: var(--color-normal);
}

td,
th {
    border: 1px solid var(--color-normal);
    padding: 0.75rem;
}

th:nth-child(1),
td:nth-child(1),
th:nth-child(4),
td:nth-child(4) {
    text-align: center;
}

td:nth-child(2) {
    color: var(--color-oscuro);
    font-weight: 800;
}

td:nth-child(3) {
    font-style: italic;
}
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>ദ്ദി◝ ⩊ ◜.ᐟ</h1>
            <h2><strong>Proyectos de Título</strong></h2>

            <input type="text" id="elInput" placeholder="Filtrar proyectos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>Títulado</th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoría</th>
                            <th>Prof.Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
            <small>Diseño y visualización de información</small>
        </div>

      <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/f094d885-24b9-4a38-bbcf-678d070a2795";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log("Mis datos:", trabajo); // Esto te ayudará a ver tus datos en la consola
                    
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.name}</td><td>${x.title}</td><td>${x.grade}</td><td>${x.category}</td><td>${x.tutor}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
